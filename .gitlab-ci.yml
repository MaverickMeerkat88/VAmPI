stages:
  - build
  - scan
  - dast

artifacts:
  when: always
  expire_in: 2 days
  paths:
    - trivy.sarif
    - semgrep.sarif

semgrep:
  stage: scan
  image:
    name: semgrep/semgrep:1.139.0
    entrypoint: [""]
  tags:
    - docker  # Не забываем указать наш тег раннера
  script:
    - semgrep ci --config p/default --sarif --output semgrep.sarif
  artifacts:
    when: always
    paths:
      - semgrep.sarif

trivy:
  stage: scan
  image:
    name: aquasec/trivy:0.67.0
    entrypoint: [""] # По умолчанию entrypoint указывает на trivy
  tags:
    - docker  # Не забываем указать наш тег раннера
  script:
    - trivy image --format sarif -o trivy.sarif --exit-code 0 --ignore-unfixed --severity CRITICAL,HIGH erev0s/vampi:latest || true
  artifacts:
    when: always
    paths:
      - trivy.sarif

zap:
  stage: dast
  image:
    name: ghcr.io/zaproxy/zaproxy
    entrypoint: [""]
  tags:
    - docker
  script:
    - mkdir -p /zap/wrk
    - python3 /zap/zap-baseline.py -t https://preview.owasp-juice.shop/ -r zap-report.html -x zap-report.xml -J zap-report.json
  artifacts:
    when: always
    paths:
      - ./wrk/zap-report.html
      - ./wrk/zap-report.xml
      - ./wrk/zap-report.json
